<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrintStation — Self-Service Printing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a0a0a;
    --paper: #f5f0e8;
    --accent: #e63946;
    --mid: #6b7280;
    --border: #d1c9b8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background-image: repeating-linear-gradient(
      0deg, transparent, transparent 39px,
      var(--border) 39px, var(--border) 40px
    );
  }
  .card {
    background: white;
    border: 2px solid var(--ink);
    padding: 3rem;
    max-width: 480px;
    width: 100%;
    box-shadow: 6px 6px 0 var(--ink);
    text-align: center;
  }
  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }
  h1 {
    font-family: 'Space Mono', monospace;
    font-size: 2rem;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 1rem;
  }
  p {
    color: var(--mid);
    margin-bottom: 2rem;
    line-height: 1.6;
  }
  .btn {
    display: inline-block;
    background: var(--ink);
    color: white;
    padding: 0.85rem 2rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    text-decoration: none;
    border: 2px solid var(--ink);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover {
    background: var(--accent);
    border-color: var(--accent);
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">// PrintStation</div>
  <h1>Self-Service<br>Print Queue</h1>
  <p>Open the printer dashboard on your PC to generate a QR code. Students scan the code to upload documents directly to the print queue.</p>
  <a href="/dashboard" class="btn">→ Open Dashboard</a>
</div>
</body>
</html>
